{{- define "main" }}

<article class="post-single" style="max-width: 100% !important; margin: 0; padding: 0 1rem;">
  <header class="post-header">
    <h1 class="post-title">
      {{ .Title }}
    </h1>
  </header>
  <div class="post-content" style="max-width: 100% !important; width: 100% !important;">
    {{ .Content }}
  </div>
</article>

{{- end }}
