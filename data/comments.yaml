  content: Hace varios años que andaba en una finca, en una Zona montañosa del norte Nicaragua me dí cuenta que se me pegaron unos siete  tórsalos, unos en la espalda y otros en el abdomen.  Cuando comencé a sentir la molestia de los gusanos, me alarmé, sentía como me "mordían" y uno que tenía cerca de la columna vertebral me molestaba mucho así que consulte con varios lugareños familiares míos porque yo no sabía nada de esos parásitos que afectan bastante al ganado. Hasta que le dije a alguien que tenía conocimientos técnicos de ganadería mayor y además criaba ganado. Parece que tenían una receta infalible, sólo diluyeron un poco del insecticida conocido como Nuvan en un poco de aceite quemado de motor(por supuesto no muy concentrado) con lo que primero mataron al "repugnante y molesto inquilino", una vez muerto usando ese insecticida, procedieron manualmente presionando hasta que salió expulsado el insecto.  Pero no recuerdo cuánto tiempo estuvieron en mi cuerpo los parásitos.
