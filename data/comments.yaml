  content: |-
    Al Señor Berkowitz lo encontraron donde lo enterraron quienes lo mataron cerca de la estación de Cristales. Un investigador privado regreso de manera repetida y regularmente a Bijao, pagado por los padres de Berkowitz. Después de varios viajes, a través de unos 6 meses, una madrugada (durante su último viaje) se acercó alguién a su ventana y le contó donde encontrar a Berkowitz.

    A la mañana siguiente reunió a gente del pueblo y con picos y palas lo fueron a buscar. Lo encontraron precisamente donde le habían indicado que estaría. El Señor Berkowitz tenía impactos de bala en la cadera, y creo que por otros lados también. Bijao no es un lugar muy seguro, y su gente tampoco es muy hospitalaria.
