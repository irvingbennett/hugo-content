  content: |-
    Hola Evelio,
    La respuesta a tu pregunta depende enteramente de factores que no están a nuestro alcance. ¿En qué condiciones estás? ¿Cuanto equipo llevas? ¿Que clase de calzado usarás? Te puedo decir que hay agua a medio camino, que te puede tomar unas seis horas subir, y que el mejor lugar para acampar es Los Fogones. Pero para llegar a Los Fogones tienes que subir a las antenas y bajar un poco. De otra forma tendrías que acampar en el cráter. De cualquier forma, no vas a encontrar más agua que la que lleves. Y recuerda no dejar nada en la montaña...  Todo lo que lleves lo debes traer de regreso.
