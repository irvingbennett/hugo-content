  content: |-
    Ok, ahora sí pues:

    Maleta
    Yo tengo una Camelpack BFM:
    http://tinyurl.com/36qzw6

    Vacía ya pesa algo, pero es *super* cómoda (en comparación a mi maleta anterior China).

    La pregunta es: ¿tú qué prefieres?  por un lado está la comodidad de llevar poco peso; por otro, la comodida de una maleta que no sea incómoda.


    Knifecraft
    Es interesante que a pesar de seguir la línea del ultra light, lleves un buen machete.  De lo que he leido, mucha gente ultra light considera una Victorinox tipo llavero, un cuchillo de camping (OJO: esto puede ser, una exageración).

    ¿Llevas otro(s) cuchillos aparte del machetón?  ¿Fixed blades, Victorinox, folder?


    Agua
    Esa siempre ha sido mi duda cuando leo sobre esas caminatas de 3 o 4 días, pero ya respondiste la pregunta: llevas un filtro.  Yo he estado variando entre una vejiga de 3 Litros, una de 2, botellas chicas Nalgene, etc.  Siento que el agua es lo que más pesa y más ocupa espacio (fuera del tema de la carpa).

    ¿Qué haces cuando vas a un área donde no hay río o quebrada cerca?


    Hamaca
    Yo no tengo una Hennesy, sino una de las que venden en Acadia.  Pero después de dormir un par de veces en ella, me reuso a regresar al suelo.

    Carpa + sleeping pad + spleeping bag + almoadillas inflables + etc y encima dormir incómod = qué plomo.

    Ahora, dormir 2 en una hamaca tampoco es muy cómodo.  Ya probamos como 3 veces y hemos desistido.

    Pilla:
    http://www.hammockforums.net/forum/


    Comida
    Nosotros también siempre llevamos el salmón ese ahumado que venden en el Rey (asumo que es el mismo).  Éxito.  ¿Tú como lo preparas?  Nosotros lo hemos envuelto en papel aluminio y tirado al fuego; y en otra ocasión, cocinado en una estufita galla que tengo (Do it).

    Alcohol
    Nosotros tampoco tomamos, así es que no puedo opinar.


    Cojín de espuma
    ¿Qué es eso?  ¿una ¿almohada?


    Fuego
    ¿Tu amigo qué hacía?  ¿prendía una fogata o calentaba el agua con el algodón?  En este punto también soy medio freak: llevo como 3 o 4 métodos de prender fuego (y siempre fallan 1 o 2).


    PD. creo que este es mi tema favorito = los chécheres.
