  content: |-
    Yo leí ese artículo, me encantó. Además, me toco ver en el 2011 como volvía a suceder lo mismo: un corredor llegó un minuto tarde a la meta, después que había sonado la campana, y no lo incluyeron en la lista de los que terminaron. ¡Qué duro!

    La carrera es muy difícil, tal vez un poco más que el Ultra Trail De Mont Blanc. Tenemos un par de horas más para terminar la carrera (48 en vez de 46). Pero lo más, más peludo es salir premiado en la rifa. Después de eso, el resto es fácil, solamente cuestión de trabajo y esfuerzo – la razón de todo, el punto. Nos vemos el sábado en tu cumple-Irish.
