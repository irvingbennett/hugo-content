  content: Bueno! A todos, tarde o temprano, nos toca. A mi, no fue uno, sino tres tórsalos los que buscaron alojamiento en mi piel. Esto fue en un lugar rural, en donde el césped estaba bien crecido. Se me incrustaron dos en un hombro y uno en la cabeza. La situación fue difícil, pero en su debido tiempo; con antibióticos, un unguento parecido al "Vic Vaporub" y presión con los dedos sobre el lugar, salieron. Dos exterminados en pedazos y uno entero, este medía aproximadamente 1,5 cm de largo y su grosor de 1 cm. Bendito Dios que "salieron", porque sentía los desgarrones de la carne por dentro. Saludos.
