  content: |-
    Hola Harold,

    El <a href="http://u8z.3d5.mywebsitetransfer.com/gallery/v/CaminoReal2008/P2170042.JPG.html" rel="nofollow">Ex-Mayor Luis Puleio</a> es un especialista de supervivencia en la selva de las antiguas Fuerzas de Defensa de Panamá. Poca gente en el mundo conoce tanto del tema como él: máximo ingenio, mínimo costo.

    Aqui Jordi tiene una <a href="http://u8z.3d5.mywebsitetransfer.com/gallery/v/CaminoReal2008/P2170035.JPG.html" rel="nofollow">mochila</a>cargada parecida a la tuya. La diferencia es el material de la mochila. La Golite Speed pesa muy poco, cerca de una libra. Casi cualquier mochila es cómoda cuando llevas poco peso.

    <strong>Machete:</strong> cuando voy a cruzar por donde pocos han pasado antes, soy un fiel creyente que más es mejor. Si voy a abrir camino, prefiero un bulldozer, Caterpillar D3, a cualquier otra cosa. Un solo machetazo para cortar un tronco es mejor que 10 golpecitos. O, Dios me libre, cerruchar con una Victorinox. Yo llevo, además, una Leatherman <a href="http://www.rei.com/product/678534?vcat=REI_SEARCH rel="nofollow">Juicy CS4</a>, y/o, un <a href="http://www.rei.com/product/760510?vcat=REI_SEARCH rel="nofollow">CRKT M16</a> de Titanio.

    Cuando no quiero cargar el filtro, hago lo mismo que Luis Puleio y luego me tomo una dosis de Zentel. Adios parásitos... Pero Luis solo se toma el Zentel cada 6 meses, en realidad las quebradas en la selva no tienen problemas. Pero como no siempre camino por la selva, y un filtro Sweetwater Guardian pesa 11 onzas, lo llevo.

    La receta de pasta con salmón es infalible y siempre queda bien. 1 libra de pasta, un salmón ahumado (retazos), 500ml de crema, 1 frasco de parmesano, o un trozo de Parmesano Grana. Apenas está lista la pasta le botas el agua, hechas la crema y el salmón, le hechas todo el frasco de parmesano y revuelves. ¡Listo! Si quieres probarla antes de hacerla, ve a Pomodoro y pide la pasta con salmón: misma receta, mismo resultado.

    <a href="http://www.rei.com/product/374053" rel="nofollow">Cojín de espuma</a> = vil <a href="http://u8z.3d5.mywebsitetransfer.com/gallery/v/CaminoReal2008/P2180045.JPG.html" rel="nofollow">foam pad</a> negro.

    <strong>Fuego</strong>, el principio del quemador de alcohol. Una mota de algodón, empapada en alcohol hierve agua. http://zenstove.net

    Yo tengo también la hamaca de Acadia, pero está años luz atrás de la <a =href="http://www.rei.com/product/684942?vcat=REI_SEARCH" rel="nofollow">Hennessy</a>. Solo el mosquitero de la Acadia pesa, y hace el mismo bulto, que toda la Hennessy Ultralight. Pero por lo que cuesta la Hennessy puedes comprar varias hamacas de Acadia. Es cuestión de costo / beneficio.

    <strong>Pasión</strong>, los chécheres son algo que me apasiona, especialmente si son útiles. Creo que desde el neolítico todos compartimos algo por la misma onda. Es cuestión de la línea que te interesa: carros rápidos o mochilas ultralivianas.
