  content: Marisol, no es una mosca la que transmite el tórsalo, es un mosquito. La mosca atrapa al mosquito y le pone sus huevos. Luego el mosquito te pica y una larva que estaba en el abdomen del mosquito se baja cerca de la picada y se introduce por la picada del mosquito. Puedes estar segura que <strong>no tienes tórsalo</strong>.
