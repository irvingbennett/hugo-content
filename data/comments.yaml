  content: Marge, llegaron. Ya pase la angustia. Están muy cómodas y las voy a sudar mucho este fin de semana. Creo que voy a tener una buena experiencia con estas zapatillas. De salida puedo decir que me van a divertir mucho por que llaman la atención y serán tema de conversación con el resto del Hash en Savannah. Lo que más me impresiona es lo poco que pesan en relación al tamaño que tienen. El piso no se siente, para nada. Son un desconecte total del terreno y ruedan loma abajo. Ya te cuento la próxima semana como me va después de este fin de semana de corredera.
