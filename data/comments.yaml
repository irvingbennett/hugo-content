    Me he fijado que mucha gente quiere cruzar el Darien, sin papeles, para ir hasta Estados Unidos, les comento que muchas de las paradas que otras personas han comentado es correcto, el problema es que ya en Turbo, el DAS no deja abordar el bote sino tienes visa a Panama, la forma es buscar a los dueños de los botes, hacer el trato por unos 50.000 pesos y te recojan fuera del puerto, esconderte en el bote y esperar que no te encuentren los policias, que hacen revision de documentos ya estando a la entrada del Golfo de Uraba, si tomas los botes te van a revisar en cada puerto que llegues.
    Y si vas a ir por tierra, el camino es muy duro tratar de llegar a Perancho, subir a Peranchito, hasta Pueblo Viejo, que es el ultimo pueblito colombiano, de alli tienes cuatro o cinco dias de camino para llegar a Yaviza, en este trayecto van a encontrar varias aldeas de indigenas panameños. En este lugar, ya puedes tomar autobus las personas no siempre colaboran pero otros si te avisan para que te bajes del autobus y sigas a pie por los controles, hay control en Meteti en Aguas Frias y a veces ponen barricadas en otros sitios, que no son comunes, de que llegues a ciudad de Panama el viaje es mas relajado pero igual tienes riesgos en los controles, trata de hablar con los taxistas que son los que mejor te direccionan,no preguntes mucho en la calle, porque hay recompensas por denunciar a ilegales, y asi el camino es bastante largo, pero ya de aqui tengan paciencia, planifiquen cuanto mas van a recorrer, cada dia y que tengan mucha suerte, pongan mucha fe, que si se puede pasar y llegar a USA.
