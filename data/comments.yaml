    Irving:
              Yo soy integrante de ADORA (Asociacion del Deporte Orientación de la República Argentina) y respondiendo a tu inquietud te digo que en todos los paises ocurre lo mismo al principio de dar a conocer un deporte nuevo. Acá llevamos varios años trabajando en la difusión del deporte orientación y el número de participantes va creciendo muy de a poco. Nosotros damos talleres,seminarios, cursos del mismo y la energía tienen que estar puesta en la difusión, lleva muchos años el desarrollo de un nuevo deporte en un país.Tal vez nosotros no lleguemos a ver los frutos de nuestro trabajo hoy, somos parte de la historia de este deporte en Argentina.

    Nosotros también hemos organizado importantes carreras aca, como la Copa Mercosur (2007) y el Campeonato Argentino del Deporte Orinetación (2009). Siempre hemos contado con el apoyo de la CBO (confederación Brasilera del Deporte Orientación) que esta muy interesada en que también crezca este deporte en nuestro país.

    Bueno quedamos contactados y deseo que Orientación se difunda en tu país, hay que ser paciente y seguir fomentandolo.

    Saludo desde Argentina
    Magali Sammarco (orientista)
