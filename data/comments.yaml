    Bueno, estas son algunas cosas q me han estado funcionando por buen par de años:

    Agua: Si es por varios dias y va un par mas de gente o si alguien expresamente me lo pide, llevo el filtro (MX Works creo q es).
     Sino, sigo fiel a mis pastillitas Coghlans, me ha ido super bien. Eso si, cuando compro un frasco las paso a otro ambar q tengo mas resistente (grueso) con todo y algodon y con mejor tapa. Por alguna razon la tapa del frasco original se oxida muy rapido.

    Mochila. Daypack o campamentos veraniegos de fin d semana, sigo fiel a mi Kelty Blanca de 2000pulg 3. Puede mejorarse, pero en sus versiones subsiguientes (como el modelo de mujer q le compre a Ivy 4 años despues) han mejorado todas las cosas q pueden mejorar n la q tengo. Ya esta descolorada, pero creo q la sigo usando por q le cogi cariño.

    Mochila grande (uds me entienden). Tengo una Wilderness System q tengo q jubilar con caracter d urgencia. Q me sugieren??? Me gusta la Kelty Coyote, pero lo malo es q no tiene compartimiento de sleeping bag. Aunq no lo use para eso (tngo l sleeping bag d Acadia tambien)  me es util esa division. Tngan n cuenta q debe ser una mochila tanto para acampar n Pma como para aguantar el trato y maltrato del mochileo (aeropuertos, buses, taxis, hostales)

    Que no sale de mi Blanca (solo se "muda" a la grande): Pastillas purificadoras,  en 2 ziplocks: firesticks, fosforos, velas, lighter; victorinox, cordiños de varios largos,  headlamp y pilas de repuesto, gel para manos (para cuando voy a cocinar), hamaca (aunque no lo crean una Hugo Boss q ha resultado buenisimamaaa), rain pant, rain jacket. Proximamente agregare 1 o 2 calzoncillos desechables: buenisimos, 0 weight y empacados son mas chicos q un habano (Farmacia El Javillo de San Fernando)

    Comida favorita: al oleo spagheti o spagethini  con pulpo al ajillo (sorry por la lata) y perejil seco picado. Shish Kebab congelado desde el dia anterior, llega fresco. (Como en el Guacamaya Harold)
