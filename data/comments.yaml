  post_id: "1324"
- id: "1062"
  author_name: Juan guillermo gaviria v.
  author_email: gaviria99@yahoo.com
  author_url: ""
  published: 2010-12-20T16:42:25Z
  parent_id: "1014"
  content: "El camino no es tuyo pero tu descripción de él sí y aunque la haces pública me parece elegante pedir permiso para citarla.\n\nEstuve en Acandi, Sapsurro, Capurgana con el encargo de la World Conservation Society de averiguar si hay presencia del oso andino alli. De 15 cazadores entrevistados 5 lo vieron en la zona pero una sola vez. Uno más nació en Yavisa y anduvo mucho por las montañas de Puerto Obaldía y afirma haber visto el oso más de 10 veces. Pensé que ese oso visto tan esporádicamente en el Darién  colombiano debería provenir del Darien Panmaño y la descripcion que das de dias enteros sin presencia humana me parecieron ideal para postular un refugio en esa zona. Ahora despues de leer que en tus cuatro viajes no oíste hablar del oso ya no estoy tan convencido de que hayas pasado por una \"osera\". El informe es para la WCS sobre un sondeo preliminar sobre presencia/ausencia del oso en el darién. \n\nSaludos\nGracias\n\nJuan Gaviria"
  post_url: /2010/11/08/transdarien
  post_id: "1324"
- id: "1063"
  author_name: Rompy
  author_email: irving@alairelibre.net
  author_url: ""
  published: 2010-12-20T17:13:20Z
  parent_id: "1062"
  content: |-
    Hola Juan,

    En esa región puede haber de todo por que es muy remota. Pero nuestro recorrido es mayormente caminando por el río, y no creo que ese sea un habitat típico para los osos. Posiblemente los cazadores y los leñadores se lo encuentran más frecuentemente por que ellos están más metidos en el bosque. Nosotros solamente nos adentramos en el bosque cuando cruzamos de vertiente, y cuando el río da un meandro muy grande nos vamos por las veredas que acortan el recorrido. Este verano quiero volver a caminar ese recorrido. Si deseas unirte estás bienvenido.
  post_url: /2010/11/08/transdarien
