  content: hola tengo 17  soy de colombia y vivo en costa rica y les quiero contar algo q le paso a mi unico hermano, afortunadamente el esta bn pero aun asi sigo pensando que hubiera podido pasar. mi hermano no puede salir del pais asi que decidimos q se viniera por tierra y el viajo hasta medellin y luego de medellin fue a turbo de turbo a capurgana, la cosa fue que en capurgana termina el camino porq para llegar a panama hay que meterse por la selva  hostil,la cosa fue q mi hermano se metio a la selva con machetes botas y las indicaciones de la gente del lugar, los dias que el estuvo alla que fueron casi 5 dias estuvo perdido  porq las personas que supuestamente lo iban a guiar lo dejaron al comienzo del camino, en la experiencia que vivio mi hermano me conto que vio muchas cosas que nadie desearia ver desde huellas de tigre hasta cadaveres de personas, muertes que no son reportadas, personas que mueren en la selva y nadie se da por enterado, mi hermano fue muy afortunado y doy gracias a dios que pudo volver con vida. yo como una persona que sufri por mi hermano durante esos dias que estuvo perdido les recomendaria no metersen a la selva del darien sin experiencia de supervivencia y menos solos o con gente que no conoscan. en esos lugares cercanos a la frontera hay personas malas que estafan a los turistas o a las personas q van con intencion de pasar a panama, no se confien, no tomen desiciones precipitadas por favor no hagan sufrir a sus familiares. es mejor hacer las cosas bien y no arriesgar la vida esa selva no es un juego..suerte
