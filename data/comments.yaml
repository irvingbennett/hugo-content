  content: Yo tuve ese gusano por mes y medio. Me recuerdo que andaba en la playa . Me dormí en el carro y de repente desperté porq senti 2 picaduras, pensé que era una avispa pero no me preocupe porq no soy alergica, asi que no le di importancia.Despues de 15 dias de tener como un "divieso"fui a 2 diferentes doctores distanciados a 15 dias cada uno y me dijeron que eran dos diviesos en la espalda, pero, me mandaron antibitico por 15 dias y no sanaba , ademas tenia los ganglios de las axilas muy inflamados, hasta me hice un ultrasonido pensando que era algo...., asi que , cansada ya, le dije a mi papa que como hacia para madurar los diviesos y me dijo que me pusiera hojas de chile picante con aceite en la noche y qie al otro dia ya las iba a tener maduras, lo hice, y al otro dia en la noche, lo que hice fue extriparme el "divieso" y cogi algo , jaj, yo pense que era la raiz del divieso pero no, llamé a mi mama y me dijo, "uyy eso es un torsalo" y lo saco apretando asi que con el segundo torsalo se procedio a hacer lo mismo solo que el segundo costo mas que saliera, cochinos animales......
