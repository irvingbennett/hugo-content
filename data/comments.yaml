  content: Entrar a Panamá sin papeles será difícil. Hay muchos retenes desde Yaviza hasta Panamá. Incluso, cuando llegues a Yaviza lo más probable es que te pidan papeles. Hay más probabilidades de saltar los retenes si te vas por la costa del Caribe hasta Cartí. Por Cartí hay una calle que cruza a la Interamericana (48 kms.). Pero aún así te queda el retén de Chepo en donde nuevamente piden identificación a los foráneos.
