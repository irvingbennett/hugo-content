  content: hi!!, con mi novia...salimos mucho en bici, por la Patagonia, Baires y etc. surge la necesidad...copie el bob, luego agregue suspension...no conforme con eso, estoy diseñando, con intenciones de venta inmediata, un trailer plastico (PRFV) con y sin susp., desarmable con manija, como valijon( equipaje facil), luces con leds, bateria 12v y autonomia varias noches, con cargador a 220 en cualquier tomacorrientes!!!, portamapas y documentos c/ cerradura, portaparrilla (viste como jode el ollin y la grasa no?), es hermetico, cruza un lago tranquilo!!, jaja, que mas te puedo decir...es el resumen de mi pasion expresada en lo que necesitaba. adelante cicloturistas, corren...lobos!! el instinto guia!!!! 27 de diciembre cruzamos desde villla Pehuenia al pacifico, parejas que quieran acompañarnos bienvenidas!!( parejas mixtas), aunque este finde, en el relevamiento en chile, nos dimos cuenta que son muy amistosos, ir solos o de varios...es aleatorio, el olfato festeja...lobos!!.
