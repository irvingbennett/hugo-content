    Bueno en primer lugar para cruzar de colombia  a panama por lancha, para los peruanos ,colombianos y,ecuatorianos y bolivianos, es imposible.ya que te piden en turbo casi como 1000 dolares de bolsa de viaje y una visa ,Pero para los paises  sudamericanos si pasan y no te ponen  muchas trabas.turbo  es un pueblo que se encuentra en la ultima carretera de la panamericana norte, despues de alli no hay carretera es monte .....muchas gente antes les hablo hace años atras podian pasar caminando por los montes de turbo hacia el primer pueblo que veian de panama ilegalmente era una demora de 3 dias,,,,,,pero ahora es peligroso la gente de turbo  me decian que hay muchos guerrilleros por esa zona por el monte (darien),y es peligroso pasar ahora  por tierra caminando hasta panama...........yo le recomiendo que no lo hagan,,,,hay muchos casos de muertes o desaparecidos por cruzar el darien.....yo estube en turbo solo  llegue en lancha hasta la miel que es panama...de alli no pude pasar no te dejan pues para ir al siguiente pueblo tienes que tomar otra lancha....era imposible...hicimos todo lo posible para pasar pero no pudimos.la señora del hotel que nos hospedamos cerca del muelle de turbo me dijo que una peruana aparecio muerta en la orilla y que esa peruana se habia hospedado en su hotel dias antes que saliera de turbo por lancha hacia panama le habia comentado  a la dueña que unos hombres le habia ofrecido llevarles hacia panama por un tanto de dinero...y se fue en unos dias aparecio muerta en las orillas de turbo baleada y desnuda.....bueno yo les recomiendo que es muy dificil....para el peruano,ecuateriano.y colombiano......recuerdo que ese cartel que estaba pegado en las orillas de la bahia donde salen las lanchas cuando lei ese cartel no podia creerlo todo el ezfuerzo fue envano de echo tenia que regresar  a lima uhy es una historia bien larga en una de esas me que de sin dinero en Colombia lo bueno que en Colombia como en manaus que es una ciudad de brasil hay alberges que te dan comidas, desayuno, almuerzo gratis, hasta le das tu ropa para que te laven gratis si eres aventurero puedes acomodaren  un hospedaje a 1 dólar…. bueno, bueno........cualquier cosa estoy para servirle mi correo es pool_1234@hotmail.com..........................ah,por si acaso conozco estas ciudades por tierra si desean un consejo de como llegar a esos lugares  aca me tienen..COLOMBIA;Medellín
    ,bogota,cartegena,turbo,leticia...........(PERU;casi todo el peru de frontera  a frontera)…….(BOLIVIA; la paz,cochabamba,santa cruz de la sierra,y la frontera con argentina)….(ARGENTINA;villazon,fr0ntera de bolivia  y argentina y buenos aires),…..(BRASIL;,tabatinga,manaus porto velho, rio branco.frontera con peru.).........bueno espero que le halla ayudado si vienen a LIMA-PERU aca estoy para contarles en persona.........bye , suerte ,QUE DIOS LES BENDIGA.
