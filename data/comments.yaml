    Hola Andrés,

    La ruta típica para hacer ese cruce es la que aparece en Lonely Planet's Central America Handbook. Es una ruta directa: Interamericana hasta Yaviza, cruzas a El Real, tomas un bote subiendo por el Río Tuira y recorres las aldeas hasta Paya. De Paya, con un guía, pasas "Palo de Letras" (el hito fronterizo) y llegas a Cacarica. Bajas por Cacarica al Río Cristales, hasta llegar a Puente America, donde supuestamente cruzará la Interamericana sobre el Río Atrato.

    Yo, personalmente, prefiero que dejen las cosas como estan y no hagan la carretera. Ya he visto lo que paso con Darién hasta Yaviza. Seguro que no podrán detener la deforestación a lo largo de la vía una vez que la construyan. Yo creo que lo único que podría ser ecológicamente viable es un tren. Cualquier otra cosa será un desastre.
