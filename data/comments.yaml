  published: 2011-10-12T08:45:44Z
  parent_id: "2940"
  content: |-
    Las Hoka se portaron a la altura, están excelentes. Todavía prefiero correr con zapatillas minimistas cuando el terreno es difícil. Este fin de semana corrí el "Ballbuster 21k" en el Inter Americas Hash y pasamos por pantanos, lagunas, canales de desagüe, campo traviesa, y terreno lleno de árboles y ramas caídas. En esa clase de desorden unas zapatillas bien delgadas permiten sentir mejor el terreno.

    El problema con las zapatillas minimistas también es que te permiten sentir el terreno. Las Hoka brillaron cuando nos tocó correr por las piedras de las vías del ferrocarril. Era como correr por senderos suaves, las piedras quedaron aisladas de las plantas del pié. ¡Las Hoka realmente son muy acolchadas! Pero todos se burlaron de mis zapatillas de plataforma.
