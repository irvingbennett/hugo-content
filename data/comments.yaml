    Hola
    Acá en Colombia estamos en una situacion muy similar, pues aunque se realizan multiples carreras Outdoor en donde las habilidades de orientacion son esenciales, la verdad es que no se corren ninguna de las disciplinas de la IOF con el rigor adecuado.
    Con este panorama de por medio, un grupo de entusiastas del tema decidimos crear el "Club Antioqueño de Orientacion" del cual no llevamos ni los primeros 2 mts recorridos !! Pero ganas, espiritu y voluntad nos sobran !!!!
    De todas maneras la experiencia es algo que dificilmente se puede ganar con el mero entusiasmo, de manera que agradezco toda la colaboracion que tambien puedan prestarnos a nosotros tambien. E igualmente, todo aquello que podamos hacer por Uds desde nuestra humilde experiencia, cuenten con nosotros.
    Qué bueno seria contar con un "ring" de enlaces virtuales entre cada uno de los clubes nacientes de nuestros paises y de esta forma compartir experiencias, anectodas, historias e informacion.
    Un saludo desde la ciudad de la eterna primavera !!

    Rafael R.
