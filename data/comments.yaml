    Mi hija tiene una picada horrenda en la corva de la rodilla, cuando la llevé al médico me dijeron que era una picada infectada y le mandaron antibioticos inyectables que no sirvieron para nada. La llevé ayer nuevamente, esta vez donde su pediatra y el enseguido dijo que eso es un torsalo y me dijo que la manera de sacarlo es asfixiandolo, que cubriera la picada con cinta adhesiva...me recomendó uno parches cutáneos que se llaman tegaderm (los que se usan cuando uno se tatúa), que se pegan bien a la piel y no les entra ni aire ni agua...aun hoy no ha salido el inquilino, pero esta noche se lo saco a como de lugar! Eso de tener un gusano alimentandose de uno como que no es de ahi!

    En adición al Vicks, hojas de tabaco y demás remedios, me recomendarón la "caraña hedionda", así que con eso voy a tratar esta noche y ya mañana les cuento en que quedó el cuento del inquilino...
