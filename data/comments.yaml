  content: "Hola! \nHace algún tiempo escribí aquí buscando ayuda acerca del tórsalo, los tuve por espacio de tres semanas, uno en la parte delantera del hombre y el otro detrás del hombre, les puse nombre: Sebastian y Pirulo. La picada no sanaba, llegué a pensar en leichmaniasis y me fui hasta el Gorgas a averiguar y allá no me dieron ningún remedio. Fui a la bajada de salsipuedes por hojas de tabaco, me las puse y nada.\nLuego de 3 semanas me fui a caminar por el parque Omar Torrijos y allá esos bichos me empezaron a morder por dentro de una manera increíble que casi me hacen llorar, se movían y sentía que carcomían la carne a su gusto. Al llegar a mi casa no aguanté más el dolor y estaba dispuesta a sacármelos como fuera. Le dije a mi mamá y ella me llevó donde un tío político que sabe de ganado y entre él y mi primo sin nada más que las manos me extirparon el tórsalo trasero hasta sacarlo, salió vivo y se movía, era realmente impresionante. El de adelante, Pirulo, fue aún más difícil, me puse el tabaco y esperé media hora hasta que me lo extirparon y salió muerto. Yo estaba cansada pero feliz de tener a mis amigos fuera. Ahora los guardo en un envase con alcohol como mi trofeo.\nLo más seguro es que por ahí me aparezca otro, andando siempre en el monte estas son las consecuencias. Aquí les dejo el link de mi website en donde escribí mi experiencia: http://www.enlodados.com/2010/06/mi-experiencia-con-un-torsalo/\n\nSaludos!"
  post_url: /2007/08/16/torsalo
