  content: Hola Carlos, me alegro que te guste mi bitácora. La Ruta Trans-Panamá esta toda en formato GPX en este sitio. Cuando tocas una ruta se te abre una ventana de Google Maps con la ruta en el mapa. Si te fijas, en el navegador esta el enlace a la ruta para que la puedas bajar. De hecho, el enlace está haciendo una llamada a Google para que lea la ruta del sitio http://u8z.3d5.mywebsitetransfer.com y la muestre en su mapa. Si necesitas más explicación me avisas y te escribo un ejemplo.
