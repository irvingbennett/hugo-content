    Hola Javier,

    En realidad no es mucho lo que puedes caminar, o lo que hay que caminar, para cruzar el Darién a pié de este a oeste, o vice-versa. La mayoría de esa ruta es acuática. Solamente caminarñias desde la caseta de guardaparques en Colombia hasta cruzar Palo de Letras y llegar a Paya (ya en Panamá), luego a Púcuro y tomar un bote para bajar el Tuira hasta Yaviza.

    Saludos,

