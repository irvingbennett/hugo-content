  author_url: http://www.facebook.com/profile.php?id=100003406213250
  published: 2012-07-02T12:00:16Z
  parent_id: "2933"
  content: No es alarmismo si no la redilaad. Es increible pensar que hay persona que dicen que estas cosas son solo invensiones de los cientificos para realizar sus propias ambiciones. Pero no hay peor ciego que el que no quiere ver. Yo recuerdo cuando nif1o que la temporada de lluvias culminaba en el mes de diciembre dandole paso a la temporada seca o verano casi puntualmente. Sin embargo hoy vemos que la temporada de lluvia se extiende hasta enero y hasta el mes de febrero y con lluvias mas fuertes y abundantes, algo que no es normal. Como decir que el cambio climatico no nos afecta y que es una invension!
  post_url: /archives/clima-en-panama
