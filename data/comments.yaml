  content: Hola a todos!! he hecho el viaje desde medellin colombia hasta la frontera con los estados unidos en mexico (tijuana) y la verdad se los recomiendo a todos pues es un viaje super interesante, recorrer centro america y mexico es increible, en panama hay unos buses que se llaman ticas bus, son de costarica y cobran muy barato el viaje hasta mexico con comidas incluidas a bordo. El paso de turbo a puerto obaldia (panama) esta lleno de adrenalina en capurgana de hacen migracion los bacanes del das el problema son los panameños (son unas cacas) pues te investigan "no se que" y despues de tanta preguntadera de estos policias viene la otra...  toca tener mucha paciencia con estos cabrones, los vuelos a ciudad de panama salen solo los miercoles y domingos y se pagan al llegar a ciudad de panama, y ahi preparense para otro interrogatorio de 4 HORAS hijueputa!!! que haces? que no haces? y de que color cagas y si tienes suerte no te haran quitar la camisa ho quitarte los pantalones... Les recomiendo ponerse la vacuna de la fiebre amarilla hantes de cruzar a ese pais, llevar el boleto internacional de salida y minimo 700 dolares en efectivo "y algo para darles a estos señores" -cualquier menudita- pues haveses se pegan de nada para dañarte el viaje-vicasmerlo@hotmail.com- estando en panama busken el terminal de buses y ahi salen hasta tapachula chiapas mexico por tierra y a disfrutar el viaje... La verdad sale muy barato este viaje.
