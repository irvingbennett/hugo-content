  content: Buena suerte Rompy..., como siempre, se que disfrutaras enormemmente las vistas y el ambiente de American River, y definitivamente terminaras. No te estreses mucho por el tiempo. Si te sirve de algo, 11 horas es el qualifying time para Western States. Dadas tus condiciones y target, no debieras tener problemas haciendo 11 horas, pero aun asi, manten en mente que muchas cosas pueden suceder, y lo mas importante es terminar. Ten tu radar bien prendido con las rocas y raices de arboles, para evitar una caida. Hidratate bastante, y come solidos. Buena suerte.
