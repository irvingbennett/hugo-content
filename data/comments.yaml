  content: |-
    Hola Irving: Primero felicitarte por tu site "airelibre" y por tu disposición en contestares a todos que te piden información sobre como atravesar el TAPON DEL DARIEN. En Febrero de 1989 en una etapa de mi viaje desde Oaxaca, México con una motocicleta BMW GS100, atravesé desde Yaviza el Tapon del Darien pasando por Boca de Cupe, Pucuro, Paya, Palo de las Letras, Cristales, Bijao, Puente de las Americas hasta Turbo. Lo que aquí te digo lo podrás verificar en mi site www.motoaventour.com
    Esta travesia me demoró 11 dias, iba acompañado de mi esposa Norma y fué lo mejor que me podria haber pasado en toda mi vida como viajero. Ahora com casi 76 años, ahún guardo la esperanza de volver (a pie) atravesar tan bella región. He observado que varios motociclistas o automobilistas te piden informaciones como pasar de Panama a Colombia. Con la experiencia de haber viajado (Via Terrestre en Moto) 5 veces desde Mexico, America Central a Sur America, podre te dar alguns tip's y así podras informar a los que te piden esas informaciones.
    Una vez mas, mis felicitaciones por tan altruista labor.. es realmente un "DAREANISTA", ORGULLO DE PANAMA!!
    Antonio Braga
    www.motoaventour.com
    Oaxaca-México
