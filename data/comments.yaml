  content: |-
    <p>Hola Mirian,</p>
    <p>Hay dos formas de participar en el maratón de Nueva York. La primera es ser un corredor lo suficientemente bueno para clasificar. Si tu hermano es buen corredor, tiene que probar su tiempo clasificatorio y le permitirán inscribirse. De lo contrario, tiene que participar en una rifa para ver si tiene suerte.</p>
    <p>Si no se inscribió en la rifa, ya es muy tarde para participar en el maratón de este año. Tendrá que esperar hasta el próximo año para entrar en la rifa. Lo mejor es inscribirse temprano, pero esto no ayuda en nada con la suerte necesaria para salir beneficiado con una inscripción. Tienes que pagar $9 (no retornables) para entrar en la rifa y dar los datos de la tarjeta de crédito a la que cargarán la inscripción. Si en la rifa sale el número de uno, inmediatamente le cargan la tarjeta de crédito y le notifican de su aceptación.
    </p>
    <p>Saludos,</p>
    <p>Irving</p>
