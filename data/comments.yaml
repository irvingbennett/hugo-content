    Hace dos días estaba en la oficina trabajando. Como estmos iniciando la estación lluviosa empezaron a salir toda clase de bichos después de las primeras lluvias. Uno de estos fue una horrible mosca gris, más grande y gorda de lo normal.
    Entró como lo loca a la oficina, dio vueltas por todo lado, y decidió que mi tobillo era el sitio perfecto para morder. Fue entonces cuando sentí el pinchazo. Cuando me logré  percatar ya la  tipa había levantado vuelo nuevamente e iba en fuga.
    Desde entonces, siento mucha comezón, el piquete está rojo y como endurecido. Siento pequeños movientos ascendentes y me desespero.
    Hoy tome unas tijeras e intenté cortar la piel, sin encontrar nada. Creo que bicho aún está muy chiquito. El tobillo está caliente y por ahora no veo que pueda hacer más que esperar  a que engorde un poco más antes de poderlo sacar.
    Saludos,
    Marcela.
