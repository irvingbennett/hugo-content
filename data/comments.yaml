  content: |-
    <p>Hola Ernesto,</p>
    <p>Hay 2 puntos que conozco por donde entrar a Panamá: por Puerto Obaldí­a, en el Caribe, y por Palo de Letras, en la frontera con Colombia. El más fácil es por Puerto Obaldí­a. Tienes que llegar a Turbo, en el Rí­o Atrato, cruzar a Acandí­, seguir por Capurganá, Sapsurro, La Miel - en cualquier de estos últimos pueblos puedes tomar un bote que te lleve a Puerto Obaldí­a.</p>
    <p>El problema es que en Puerto Obaldí­a te estarán esperando para llevarte a Migración. La otra forma de entrar es cruzar la frontera y salir justo después de Puerto Obaldí­a. Este camino te lleva al poblado indí­gena de Armila. Alguien allí­ te puede llevar por el Rí­o Marragantí­ hasta Metetí.</p>
    <p>Pero, por donde escojas cruzar, vas a encontrarte con policí­as fronterizos esperándote. Y, por supuesto, tienes tus amigos de la FARC por el monte.</p>
    <p>Suerte,</p>
    <p>Irving</p>
