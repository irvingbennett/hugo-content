    Hola Irving.  A mí me pasó lo mismo en un trillo cerca de San carlos.  Me picó un tórzalo y el gusano vivió dentro de mí durante un par de semanas.   Pero sabes qué?.  La gente en el interior tiene respuesta para todo.... Visitando la finca de la familia en Potrerillos, Chiriquí, el cuidador me vió la herida y me dijo tienes un tórzalo.  En ese momento no lo sabía y eso que había ido a varios médicos pero ellos pensaban que era una infección normal.

    El cuidador consiguió hojas de tabaco, las amarró con una gasa y esparadrapo. .. Inmediatamente sentí algo, pero fue hasta el día siguiente que me lo quitaron y apretaron la herida....  salió un gusano feo, pero muerto y sin dificultad...

    Toda una experiencia!!!

    Saludos,

    Eduardo Navarro
