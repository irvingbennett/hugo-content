  published: 2010-12-13T08:07:38Z
  parent_id: "993"
  content: Jamás he visto ese oso... Ni siquiera lo he escuchado mencionar. Solamente lo conozco de mis libros de animales. Ese <a href="http://tolweb.org/Tremarctos_ornatus/123663" rel="nofollow">oso</a> y el <a href="http://tolweb.org/treehouses/?treehouse_id=4870" rel="nofollow">hormiguero gigante</a> son de las fábulas.
  post_url: /2010/11/08/transdarien
  post_id: "1324"
- id: "1002"
  author_name: Juan Guillermo Gaviria V.
  author_email: gaviria99@yahoo.com
  author_url: ""
  published: 2010-12-13T21:23:49Z
  parent_id: "0"
  content: "Rompy El oso hormiguro gigante te refieres a Nombre científico: Myrmecophaga tridactyla? Ocho, de quince cazadores y madereros en Acandí, Colombia me aseguraron haberlo visto y lo nombraron como OSO COLECABALLO,  OSO RABOECABALLO, OSO DE PICO, OSO HORMIGUERO, ZORRILLO HORMIGUERO. \nLlegue a tu articulo en la web porque los lugares que citas coinciden con los de la supuesta presencia del oso en las montañas de Puerto Obaldia que me dio un cazador. Son: cabecera del Rio Pito arriba cerca a un indio (bastante arriba de la boca de Cubilete) que tiene una cría de puercos de monte y 20 cabuyas de naranja que saca a Palma saliendo por Canaán."
  post_url: /2010/11/08/transdarien
  post_id: "1324"
- id: "1008"
  author_name: Rompy
  author_email: irving@alairelibre.net
  author_url: ""
  published: 2010-12-14T07:46:30Z
  parent_id: "1002"
  content: ¡Esa es una buena noticia Juan! Si el indio del Pito está sacando naranjas por Canaán, creo que es un bárbaro. Eso es mucho mulear para vender 20 sacos de naranja. Este verano quiero regresar a ese camino, de Puerto Obaldía a Canaán. ¿Tendrás idea de como anda la guerrilla por esa zona?
  post_url: /2010/11/08/transdarien
  post_id: "1324"
