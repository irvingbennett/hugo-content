    La entrada del Camino de Cruces está en el Camino Madden, entre la desviación que va hacia Gamboa y el puente de Don Bosco en Chilibre. Hay un letrero y unas casetas que indican donde está la entrada, y un estacionamiento para dejar el auto. Puede ser peligroso dejar el auto estacionado en la entrada del Camino de Cruces. Se de muchas personas a quienes le han robado cosas del auto al dejarlo estacionado en la entrada del Camino de Cruces.

    No debe ser necesario un guía para recorrer el Camino de Cruces. Pero esto depende de que tan bien puedan seguir las marcas de indican el sendero. Por tramos, el sendero es muy claro y es obvio que se está caminando sobre un sendero empedrado, y luego el sendero se desvía de la línea original por diferentes razones, hasta regresar al sendero original nuevamente.  Puede ser buen idea llevar cinta de agrimensor y dejar un rastro del recorrido que están haciendo para poder seguirlo de vuelta.
