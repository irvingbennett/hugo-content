  author_name: Juan guillermo gaviria v.
  author_email: gaviria99@yahoo.com
  author_url: ""
  published: 2010-12-14T16:16:48Z
  parent_id: "0"
  content: |-
    Hay una presencia mas fuerte del ejercito panameño lo que se supone haría mas dificil a irregulares estar allí. Me han dicho reiteradamente que no hay minas quiebrapatas, lo que sí es muy reconfortante. Trataré de averiguarte.

    Puedo presentar en un informe tu descripción del camino Pito Canaán?

    Saludos

    Juan Gaviria
