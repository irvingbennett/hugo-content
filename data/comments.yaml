  content: |-
    Hola Mateo,

    Tal como puedes leer, el que decidió la ruta fue el arqueólogo Mark Horton:

    http://en.wikipedia.org/wiki/Mark_Horton_(archaeologist)

    El trazó la ruta en un mapa y nosotros la seguimos fielmente. Dile a Miguel de la Quadra-Salcedo que si quiere la ruta tiene que incluirme en la expedición, o pedírsela a Mark Horton. Hace un tiempo conversamos y me dijo que estaba planeando llevar a sus jóvenes por ese recorrido.
