  content: Despues de leer varios articulos y hacer mis propias medidas, me embarque en la idea de hacer mi propio Kayak/canoa para lo cual recolecte madera de la calle para hacer el molde y luego lo cubri con fibra de vidrio y reforse por las orillas. Aunque no quedo como esperaba funciono y me di cuenta que debia invertir en unos planos. Al final compre un Kayak de plastico lo he usado en varios lagos aqui en Panama y he bajado el rio la villa desde macaracas hasta el puente del rio La Villa en Los Santos. Por motivos de aventura mande a hacer una canoa de fibra de vidrio que tengo por estrenar. De algo si estoy seguro... la aventura y remar en cuerpos de agua asi como el disfrute de la naturaleza ... van de la mano. Deseo hacer varias bajadas como las que menciona Rompy (Santa Maria, Mamoni, Bayano) y coronar con un viaje por mar en el pacifico por lo menos hasta aguadulce. Leyendo este blog, me animo a seguir mis planes y poder lograrlos ya que veo otros lo han hecho o estan pensando hacer y de repente porque no me sumo a alguno de los trips de kayaks para aprender cosas nuevas. Les dejo este link con un video del trip rio la villa 2014. http://youtube/38XoK5sgr-Y
