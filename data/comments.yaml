  content: |-
    Hola!
    Hace poco estuve por el Camino de Cruces y ya no está marcado, fue un poco difícil encontrar la ruta, si no fuera por los árboles marcados con retazos de tela, quizás nos hubiéramos perdido. No pensé que fuese difícil, caminamos desde Camino de Plantación hasta Venta de Cruces, ida y vuelta, incluso nos refrescamos un poco en la orilla del Gatún.
    Es increíble que estando tan cerca de la ciudad pudiésemos ver tanta fauna y flora, quedé maravillada con la gran cantidad de aves en el camino, típico del área de Gamboa, pero de una manera sobrenatural en el Camino de Cruces. También vimos el árbol de vela y sus frutos regados en el piso, incluso fuimos perseguidos por monos cariblancos, y tuvimos la dicha de ver monos aullados y tití.
    Camino de Cruces es una verdadera aventura, mucho más cuando vas con poca agua y comida, como mi caso, pues no tenía pensando caminarlo entero ida y vuelta ese día hasta salir a la carretera de Gamboa nuevamente.
    Gratificante!
