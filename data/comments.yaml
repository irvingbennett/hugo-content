  content: |-
    Rompi, excelente. Igual que tu estoy fascinado por los mapas y todo siempre lo trato de poner sobre uno.  La ubicacion geografica y la escala temporal  lo que consolida los eventos y les da sentido. No es lo mismo escuchar de un evento que verlo en el mapa para entender el contexto de donde ocurrio. Yo salgo de aventura mucho menos que tu pero definitivamente jamas salgo sin un mapa y sin una brujula... y de hecho lo primero que hago antes de viajar a cualquier lugar es verlo (hoy) en Google para orientarme y me llevo una brujula. Igual que antonio yo soy vieja escuela y siempre me gusta un mapa de papel a mano, en situaciones criticas no me gusta depender de baterias (tu mejor que nadie sabe de esas cosas).  Yo tambien tengo mi coleccion de mapas en varios lugares por la casa! muy bien enrollados o doblados, los del canal  los bañaba en cera para hacerlos resistente al agua cuando salgo al canal.

    Definitivamente los mapas son maravillosos, sirven para saber donde vas, de donde vienes, donde estas y donde estuvieron tus antepasados... mi proximo proyecto casero es conseguir un mapa gigante, ponerlo en una pared y poner alfileres marcando donde he estado yo, donde ha estado mi familia y donde quiero ir si Dios me lo permite. Gracias por el articulo y por compartirlo... excelente!!!

    abrazos

    Octavio
