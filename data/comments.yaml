    Hola Daniel,

    He pasado por Sapsurro, pero nunca me he quedado en ese lugar. Siempre me he quedado en Capurganá, que queda muy cerca. Yo siempre voy desde Panamá. En Colombia tendrían que llegar a Turbo y de allí tomar un bote a Acandí, o algún otro poblado cerca de ese. Turbo está al lado este del Atrato, que solamente se puede cruzar en bote. Una vez que llegues a Acandí pueden llegar caminando hasta Sapsurro, parando en los poblados entre medio (Capurganá).

    Yo he estado en Turbo, desde donde he partido en bote Atrato Arriba hasta el Parque Nacional Los Katíos. A Turbo llegué en avión desde Medellín. Pero si van a ir en bus, pueden tratar de llegar a Unguía. El camino no cruza el río, pero los deja en una orilla donde siempre hay taxis acuáticos que los cruzan al otro lado para seguir el viaje en bus. De Unguía hay bus a Acandí.

    Saludos,

    Irving
