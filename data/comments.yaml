  content: '[...] #2: &quot;Al Aire Libre&quot; descibes what a &quot;machete&quot; is and how useful to carry it when exploring the jungle (ES): El machete es una herramienta fundamental para las travesías por el bosque tropical. El fin de semana del 14 y 15 de octubre caminamos desde La Línea, justo antes de Nombre de Dios, hasta Boquerón Arriba. Es una travesía de 25 kilómetros que atravieza el Parque Nacional Chagres. Hay bastantes árboles caídos a lo largo del camino y se necesita tirar machete con frecuencia para cruzar las marañas que se forman cuando un árbol expone el suelo del bosque a la luz del sol. Yo generalmente saco mi machete en cuanto entro al dosel del bosque y no lo guardo hasta salir. Continuar leyendo&#8230; The &quot;machete&quot; is a very important tool used in trips to the tropical forest. During the weekend of October 14 y 15 we walked from &quot;La Linea,&quot; just before Nombre de Dios, to Boqueron Arriba. It is a 25 kilometers trail which goes through the Parque Nacional de Chagres (Chagres National Park). There are many fallen trees along the train and that is when the machete becomes really handy to cut them off as well as other weeds and that grow after a fallen tree exposes the ground to the sun light. I normally carry my machete out since I step into the forest until we finish the walk. Continue reading&#8230; [...]'
