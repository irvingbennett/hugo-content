  content: |-
    Pavo:  El asistente de un conductor de autobuses.
    Chota:  El carro de la policia donde acarrean a los detenidos
    Tongo:  El policía
    Rejo:  Además del descrito arriba, también es: disciplinar con un látigo de cuero o correa.  "Te voy a dar rejo si te sigues portando mal."

    Otros anglicismos usados por todos :-)
    Gial:  Girl.
    Wanwei:  One way
    Choteo:  Shout out
    Charcotear:  Short cut (recortar camino)
    Winchi guaiper:  Windshield Wiper
    Friking/Frikeado:  Freaking.  En panameño significa aburrido, molesto, decepcionado.
    Culéi: (bebida)  Cool Aid
    Cuara:  Quarter
    Wing:  Lado/área/ocupa tu lugar:  "Mira Blod, mejor coge tu wing."
    Konfléi:  Cornflakes

    Del Chino:
    Chúi Ma Faa:  Mafá (fritura de harina frita, tostada)
