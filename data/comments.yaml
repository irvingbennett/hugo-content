  content: |-
    Hola Eliecer,

    Hacer el camino del Boquerón depende mucho de tu habilidad como navegante. La ruta está clara en los mapas de 1:50000 que cubren el recorrido. Pero el sendero solamente es obvio hasta un poco después de la Quebrada La Escandalosa. De ese punto en adelante mucho del camino es por el río, y hay un tramo en el que tienes que conectar el Río Boquerón con el Río Nombre de Dios a campo travieza.

    Lo ideal es que al principio planees salir de Boquerón, llegar hasta donde puedas y acampar alli. Al día siguiente regresas de vuelta al auto. Este es un excelente viaje y el Río Boquerón tiene unas charcas espectaculares.

