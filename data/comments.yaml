  content: Hola Federico, si tienes todos los papeles, y quieres algo seguro, viaja a Puerto Obaldía y cruza en lancha costera hacia Capurganá. De allí puedes continuar por tierra hasta Acandí. De cualquiera de estos lugares puedes volar a Medellín, o tomar un bote a Turbo. Desde Turbo ya puedes seguir por la costa hacia Cartagena y seguir tu camino al sur. Suerte en tu viaje. Busca información de vuelos en http://flyairpanama.com/ y en http://www.tacaregional.com/indexpa.asp.
