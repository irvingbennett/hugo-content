  content: "Que tal Rompi\n\nTomando de referencia \"El Valle Trail Marathon, version 2009\", en el recorrido de los 42km se hacia un retorno en 'El Limon', donde habia un 'puesto de control' y se anotaba la hora en que pasaba cada corredor por dicho lugar, y a la  vez, \"si el corredor prestaba buena atencion\", este podia saber la posicion que llevaban en la carrera, siempre y cuando hubiera contado los corredores que se encontraba antes de llegar a dicho retorno... \n\nEstoy seguro que habra uno (o tal vez varios) 'puestos de control' donde se anotara la misma informacion.  Sugiero tambien se le brinde al corredor informacion como 'la posicion que lleva en la carrera' y 'cuantos minutos le lleva el corredor anterior'.\nYa dependera del corredor saber que hara al respecto...\n\nMi pregunta es:  En que kilometro estara este 'puesto de control'?\n\nTodo esta excelentemente organizado, pero me adelanto con esta pregunta, que es la que hubiera hecho en el futuro 'congresillo'.\n\nSaludos,\n\nJorge A.R.V."
