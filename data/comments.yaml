  content: "Anacardium excelsum \nFamilia: Anacardiaceae \nNombre común: Espavé \nEste es uno de los árboles más abundantes en el área de la ciudad de Panamá y Gamboa y se encuentra a ambos lados del Canal y en buena parte de la vertiente pacífica (se ve mucho menos en la costa atlántica). En algunas regiones se concentra en agrupaciones casi homogéneas y su presencia es frecuente en las orillas de quebradas. Ningún otro árbol del área se encuentra tan disperso como el Espavé; sus hojas grandes, su tronco grueso, su corteza oscura y falta de espolones se pueden distinguir con facilidad. En el bosque, lo podemos identificar fácilmente por su intensa muda de hojas debajo de la copa, pero en las áreas urbanas y agrícolas se encuentra más frecuentemente en su fase juvenil por lo que puede resultar más difícil identificarlos. Debido a su abundancia y gran tamaño, la madera del Espavé se vende con frecuencia en los mercados de Panamá y tiene muchos usos, incluso para hacer piraguas. La fruta, aunque parecida al marañón, no es comestible, pero la semilla tostada se consume localmente. Muchas especies de la familia Anacardiaceae tienen aceites tóxicos y, al igual que las semillas del marañón, las semillas crudas del Espavé son tóxicas, pero las hojas no. \n Se encuentra en la Provincia de Panamá y la Provincia de Darién a una altura de 30 m aproximadamente.\nDistribución Y Habitáculo: Se presenta en grandes cantidades en la costa del pacífico de Costa Rica. Además en la costa del Caribe de Colombia y Venezuela parece confinado a regiones con estaciones secas definidas y a pesar del tipo de bosque perennes densos, no crece a elevaciones altas. Corrientemente alcanza el desarrollo óptimo en los suelos bajos y bien drenados. En la provincia de Darién, Panamá, parece formar masas boscosas puras en áreas grandes.\nDescripción Del Árbol: Bajo condiciones favorables en el bosque, el Espavé alcanza alturas de 125 - 150 pies (37.5 - 45m), con un tronco limpio de 4 - 6 pies (1,20 - 1,80 m) de diámetro sobre el ensanchamiento basal; los troncos son libres de ramas en los primeros \n40 - 50 pies (12 - 15m) ocasionalmente 60 pies (20m).\nCaracterísticas Generales: Marcada diferencia de coloración entre la albura y el duramen; en condición verde la albura es rosada, mientras que el duramen es pardo amarillento. En condición seca la albura es rosada, y el duramen varía de pardo oscuro a pardo rojizo.\nPropiedades Físicas:\nPeso Específico: La madera de Espavé es moderadamente liviana con un peso específico de 0.38 (0.34 - 0.42) en base a peso seco al horno y volumen verde. Es más liviana que otro material ensayado de la misma especie de Panamá, Venezuela, y Colombia. En cuanto a esta propiedad, el Espavé puede compararse con especies como Jabillo, Aceituno y Yellow Oplar. El peso verde de esta madera es de 960 kg/m3, aproximadamente 60 lb/pie3, a una humedad de 1555%.\nContracción: Espavé se caracteriza por una contracción moderada para una madera de su densidad. \nPropiedades Mecánicas: \nLa madera de Espavé se compra bastante bien con Anacardium de Venezuela y Panamá, con valores ligeramente menores a excepción del módulo de elasticidad. Espavé indica valores promedio entre Jabillo y Yellow Oplar en esfuerzo al límite proporcional, módulo de ruptura, módulo de elasticidad y dureza de extremos; muestra valores inferiores que ambas especies en trabajo al límite proporcional, trabajo a las cargas máximas y dureza lateral.\nCaracterísticas De Secado Y Propiedades De Trabajabilidad:\nSe reporta el Espavé como una madera fácil de secar y que puede secarse rápidamente sin daño apreciable. Sin embargo un estudio realizado dice que cuando se seca al aire es moderadamente difícil de secar, el material que secó rápidamente mostraba torceduras moderadas y una leve tendencia a agrietarse. La madera es fácil de trabajar pero tiene propiedades de cepillado y lijado muy pobres. Maderas cepilladas y lijada muestra astilla duras y especialmente grano machudo en madera de corte radial y tangencial. \nDurabilidad Y Propiedades De Preservación:\nEl duramen de Espavé se reporta como durable y es muy difícil de preservar.\nUsos Posibles:\nCarpintería general y construcción, utensilios de madera, muebles de bajo costo, acabado y ebanistería, chapa y contrachapado, cajas y cajones, construcción general e interior y exterior cuando la resistencia no es factor importante."
