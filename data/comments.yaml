  content: "Jorge,\n\nEn teoría deben haber varios lugares donde nos podrán informar de nuestro progreso en relación con el resto de los competidores. Lo que no veremos este año es a lo demás corredores regresando, como se dio el año pasado. Este circuito no repite ni un solo tramo, es un verdadero circuito cerrado. Posiblemente existan varios lugares en los que podremos ver a los que tengamos relativamente cerca, al frente, como llegando de regreso a La Mesa, o estando ya sobre el espinazo de La India, e, inclusive, en la recta final que mide un kilómetro. \n\nMejor es que nos revisen en Río Indio Centro y Boca de Las Minas. Hay varios en el grupo de corredores que podrían tomar atajos..."
