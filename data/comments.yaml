  content: |-
    Hola Rompi:

    Estoy seguro que la ruta que se decida al final no sera preocupacion para los participantes.  Me agrada ver la disposicion de los atletas hoy en dia, que sin conocer los niveles de dificultad de una ruta, toman el reto y dan lo mejor de ellos sin importar el resultado.

    Tomando de referencia la participacion entre el 2009 vs 2010, hubo un incremento de 100%.  No me sorprenderia que en el 2011 el evento volviera a crecer un 100% o mas.

    Hay tantas historias antes, durante y despues de la carrera, que sugiero que este evento tenga su propia pagina web (algo asi como www.elvalletrailrace.org) y alli se deposite/copie toda la informacion que estan en diferentes paginas webs y blogs...
    En estos momentos hay diferentes entidades (Panama Runners, Pura Voluntad, Hash, Panama Sport Magazine, etc... asi como los personales con relatos, fotos y videos interesantes como el tuyo, asi como de George Shoemaker, Carlos Retally, Fernando Revuelta, Climido Rivero, mi persona, ect... con unos escritos que facilmente transportan a cualquier lector.

    Toda esta informacion es excelente y son como piezas de rompecabezas, cada una es unica, y todas juntas definen el evento.  Pero 'la imagen total del evento' no se puede apreciar si las piezas no estan juntas...

    Por suerte, hoy en dia contamos con herramientas que nos dan una solucion a este punto.  Hay suficiente informacion, fotos, videos, relatos, etc... tanto del 2009 como del 2010, para que los interesados puedan brindar a la misma...

    Traigo esto a colacion por varias razones:
    - Para que los organizadores puedan brindar informacion relacionada con el evento (costo, mapas, resultados, fotos, videos, etc..)
    - Para  que los participantes (locales o en el extranjero) puedan obtener datos necesarios para inscripcion, preparacion, lista de los inscritos, detalles generales de la carrera, y luego incluir sus comentarios, fotos o videos despues de participar en el evento.
    - Para que los expectadores, familiares o amigos que esten en el extranjero o no puedan asistir al evento, tengan acceso al mismo de una forma electronica.
    - Usarla como tarjeta de presentacion para 'posibles y futuros patrocinadores' logren identificarse con el producto.

    Bueno, se que el trabajo no es facil y sugerir ideas no es suficiente, por tanto me ofrezco para apoyar y desarrollar el evento en el 2011 y cuando sea necesario.

    Saludos,

    Jorge A.R.V.
