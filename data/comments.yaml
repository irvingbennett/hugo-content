  published: 2017-09-18T16:54:15Z
  parent_id: "14086"
  content: 'Hello Rebecca, I am glad you like this place. The tracks no longer open in Google Maps because they changed their api and I have not bothered to fix it. You can still download the ".kmz" file from the maps display if you highlight the filename and try to open it directly. Like on the Boquete - Frontera route the filename would be: http://u8z.3d5.mywebsitetransfer.com/mapas/Boquete-Frontera.kmz. Also, if you prefer the .gpx file itself I can send you the sections you need. Just let me know which ones you want.'
