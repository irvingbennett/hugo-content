  content: Creo que los 5 kilómetros que necesitamos para ser una bona fide ultra no deben agregar mucho más de 1 hora a la carrera. Esto pone a un grupo justo en las 10 horas para completar la carrera. Si partimos a las 6:00am, muchos van a estar cerrando a las 4:00pm. La ruta a Altos de La Estancia es muy agradable, fresca, sombreada, y bastante a nivel. Ya la gente vendrá algo cansada, pero no deben tener mayores problemas completando este tramo. Inclusive podemos hacerlo un ida y vuelta para que los corredores se topen, se midan, y tengan un último incentivo para ver que hacen con sus últimos alientos.
