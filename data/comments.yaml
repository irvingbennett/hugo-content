  author_name: Irving
  author_email: irving@alairelibre.net
  author_url: http://alairelibre.net
  published: 2006-10-01T09:33:30Z
  parent_id: "0"
  content: |-
    Mi mochila Golite Speed, que usa un material bastante liviano ha aguantado 4 años, y creo que puede soportar otros 4 años más. He tenido que hacerle una reparación y ya tiene varias razgadas. Definitivamente que el material no es tan fuerte como Cordura Nylon, pero ese es el compromiso: peso y duración versus ultraliviano y delicado. Es cuestión de ser cuidadoso.

    En cuanto al agua, no puede decir nada de la lona, pero con una buena hamaca puede llover todo lo que quiera - yo voy a estar seco con la Hennessy Ultralite. Y no llega a pesar 2 libras. Estos es 4 veces más que una lona bajo la cual pueden dormir dos personas, pero a la lona habría que sumarle el mosquitero para el trópico y quedamos bastante parejos.

    Es cuestión de buscar los ahorros pequeños, las onzas de menos, y las libras se cuidan solas. Por ejemplo, esta gente siempre usan vejigas de agua en lugar de botellas de agua. Casi todos los recipientes que cargan son de titanio (demasiado caro para mi gusto). Y caminan en zapatillas en lugar de botas.
