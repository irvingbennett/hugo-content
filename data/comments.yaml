  content: Así es, yo hice Cozumel el año pasado. Sería el lugar ideal para una bicicleta de triatlón. Pero no me fue mal con mi ruta. Lo que siempre me pregunto es ¿cuanto tiempo puedo ahorrarme solamente por usar una bicicleta de triatlón? O ¿cuanto más va a subir mi promedio debido a la bicicleta y la posición? Los <a href="http://u8z.3d5.mywebsitetransfer.com/2010/05/16/censos-y-numeros" title="Números" rel="nofollow">cálculos</a> que he leído indican que me podría ahorrar 20 minutos.
