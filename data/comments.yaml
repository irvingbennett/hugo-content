  published: 2010-10-01T11:35:38Z
  parent_id: "0"
  content: "Coincido con Pedro. Una bicicleta aerodinámica estilo cabra es una gran diferencia si el circuito es adecuado a la misma. Obviamente el que la mueve es fundamental. Un mal ciclista en la mejor bicicleta no hace nada, pero estoy convencido de que Federico con una mejor bici hubiera ganado tiempo. Lo que sucede es que la aerodinámica no trabaja igual en todos los circuitos. Es entendible que en un circuito de continuos sube-baja y con curvas se aprovecha mucho menos las ventajas de una buena flaca. Nadie por ejemplo corre con un camelback en la maraton de Panama, pero si en la del Valle. Los implementos dependen mucho del circuito a realizar. Si no quieres incurrir en un gran gasto, yo lo que si haría sería pillar un manillar de triatlon. Solo el apoyar los brazos y adoptar una postura mas cerrada reduce enormemente la resistencia al aire, y adicional descansas la musculatura. \nSaludos,\nFER"
