  author_url: ""
  published: 2011-02-17T07:26:35Z
  parent_id: "0"
  content: |-
    Este relato ya lo habia leido: fascinante, descriptivo, temerario, aventurero, osado y hasta cierto punto peligroso. Irving Bennett es uno de los panameños desconocidos que conoce la geografia de Panama, ha esido entrevistado y publicado en revistas, pero su experiencia no llega a el mundo de la aventura, debo decir que en mi vida nunca he crusado palabras con él, ma ssin embargo al conocerlo, me lo he encontrado dos veces en medio de la nada, el haciendo vida al aire libre y yo buscando rutas.
    En Panama hay gente muy capaz para operaraciones de busqueda y rescate (SAR) Asi como Irving monto una operacion SAR compleja, hay metodos basicos de busqueda, rescate y recuperacion, que se aprenden en cursos de montañismo y supervivencia. Pero hacerlo solo como él lo hizo es temerario, y de un gran espiritu de ayuda humanitario, pues segun el relato y a vista de ojo en dolares de la epoca estoy seguro que gasto cerca de $2.500.00 dolares entre pasajes aereos y compras.  Por mi experiencia como militar, rescatador de selva y montaña y algunos años de experiencia en Darien, no es seguro desde hace mas de 20 años realizar giras en solitario a la provincia de Darien, lo mejor es hacer un grupo de busqueda integral e involucrar a las autoridades, pero antes de eso, se debe prevenir a quien haga estudios y misiones humanitarias sobre aspectos de seguridad, po rlo que relata Irving, el señor Berkowitz tenia una bitacora de trabajo, que facilito su busqueda.
    Gracias Irving Bennett por este relato y por disponer de tu tiempo para una labor humanitaria.  Ivan Batista
  post_url: /bsqueda
  post_id: "556"
- id: "3506"
  author_name: Antonio Braga
  author_email: braga@motoaventour.com
  author_url: http://www.motoaventour.com
  published: 2012-02-24T13:48:36Z
  parent_id: "0"
  content: "Sr. Irving Bennett: Cordiales saludos..En febrero de 1989, partiendo de Yaviza con mi esposa e mi moto (BMW gs1000), hicimos el mismo trayecto que el Sr, Stephen Berkowitz solo que com mas suerte pues llegamos a nuestro destino (Turbo) sanos y salvos. Durante todo el recorrido siempre fuimos acompañados por guias de las diversas comunidades por donde pasabamos. Hago esta refrencia porque soy un apasionado del Darien y se alguna vez mas lo vuelva atravesar lo haré con las maximas medidas de seguridad, siempre acompañado por los guias..Lastima que no hayan encontrado a Stephan Berkowitz, pagó muy caro su imprudencia. \nFelicito su relato y la labor tan altruista para con los demas.\nAntonio Braga\nwww.motoaventour.com\nOaxaca-México"
  post_url: /bsqueda
  post_id: "556"
