    Nota importante:

    NoTubes no detiene el escape del aire cuando la pared de la llanta es desgarrada o cortada. Además, hay que revisar el nivel del líquido cada 3 meses por que puede secarse por diferentes razones.

    Este fin de semana que pasó me fui a dar una montada larga por atrás de El Valle, hacia el área de Penonomé, por Loma Grande, Oajaca, Sofre, regresando a El Valle por La Estancia. Es una vuelta como de 35 kilómetros. Cuando ya estaba a unos 15 kilómetros de El Valle, pasé a velocidad por un pedreguero y una piedra me cortó la pared de mi llanta trasera. Todo el aire se salió instantáneamente por el tamaño del corte que me hizo la piedra. Me había ido a montar solo y no me llevé tubo de repuesto, ni bomba de aire. Me tocó caminar 2 horas de vuelta a El Valle.

    Esto ya me había pasado antes, pero hace tanto tiempo que se me había borrado de la memoria. La moraleja: cuando montas solo, lleva tubo y bomba de aire. Normalmente los dejo en la casa cuando monto con amigos - que ellos carguen ese peso.
