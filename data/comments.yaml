  content: Respetable Ricauter existen cabimos climaticos cada cierta cantidad de tiempo, recordemos que siempre hay uracanes ,tormentas, nevadas terribles a lo largo de la historia,volcanes en erupcion,etc etc etc, el clima cambiara siempre estemos los humanos o no recuerda que la poblacion humana antes no era tanta e igual habian sismos y cataclismos,torbellinos e innundaciones, se  de muy buena fuente que en la ONU hay gente con no muy buenas intenciones que nos quiere.hacer creer que el problema somos nosotros y por lo tanto debemos desaparecer y asi convencernos de que lo que ellos dicen es la verdad, cuento!!!!!!!!! Todo ese alarmismo es publicidad de la onu y politiqueriagringa pues el clima cambiara de la.forma en que quiera hayan humanos o no. Saludos.
  post_url: /archives/clima-en-panama
