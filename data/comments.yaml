  parent_id: "0"
  content: |-
    <p>Hola Samuel, no soy un experto en estufas, pero te puedo hablar de mi experiencia con estas estufas. Primero, son muy livianas - para un fin de semana la estufa más su combustible (alcohol) pesa menos que una estufa convencional de gasolina o keroseno. Segundo, la estufa es muy confiable puesto que no hay piezas que se dañen, ni boquillas que se tapen. Tercero, la estufa es barata y está hecha de material reciclado - una lata de gaseosa, o, mejor aun, de cerveza.</p>
    <p>La desventaja de la estufa de alcohol es que no calienta suficiente para cocinar para un grupo. Tampoco sirve para cocinar por largo rato. Y, por último, tampoco se puede regular su flama. </p>
    <p>Para mayor información te recomiendo http://zenstoves.net.</p>
