  content: Hace exactamente 40 días que me picó un mosquito y me trasmitió la larva. Desde ese tiempo hasta hoy no supe que era, hoy finalmente fui con la doctora y me explicó que era de una mosca pero no me dió más detalles. Me dijo que con albahaca perfectamente salía la larva luego de colocar trapitos / paños calientes. Lo hice pero no funcionó! Llamé a un doctor que las quita perfectamente con una operación quirúrgica y cobra como 60 dólares por extraerlo, hice la cita pero me pareció excesivo! Luego, desesperada busque en internet y encontré miles de casos y videos. Creo que todos pasamos por lo mismo de no saber qué es desde el principio, pensando que es una pequeña infección y que desaparecerá solo. Bueno,  en un par de horas le pondré la cinta con vaselina, espero que se quede muerta y pegada para poder sacarla con las pinzas. Realmente ya no la quiero ahí! Qué bueno que me entero hasta hoy porque si no no hubiera pasado bien todos esos 40 días sabiendo que tengo un parásito horrible en mi pierna.
