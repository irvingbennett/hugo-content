    Un grupo de amigos y yo (Ichi de Coclé Aventuras y Seibert de Ecoviajeros, tal vez Abdiel Barranco del Club Ecoaventura) queremos bajar en kayaks, 1 inflable y dos sit on top, el río Chame desde el puente que cruza la interamericana hasta la desembocadura en playa Malibú.

    Haz hecho alguna vez este tramo? Estuvimos viendo la topografía en google earth y, según el principio y el fin del recorrido, debería ser un tramo sin rápidos, o por lo menos sin ninguno peligroso, como para pasar en un sit on top.

