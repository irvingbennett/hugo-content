  parent_id: "6319"
  content: ¡Gracias Antonio! A mí también me gusta tener un mapa cuando voy de caminata. Ahora imprimo los mapas que me voy a llevar en el Papel de Aventura de Nat Geo para que no se me dañe el mapa de papel que tengo. En http://u8z.3d5.mywebsitetransfer.com/mapas hay acceso para descargar mapas digitales de Panamá en escala 1:50,000 para imprimir en Papel de Aventura y para importar a Expert GPS y geo-referenciar.
